name: Build and deploy Hexa Assist V2 to Azure Web App

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'

      # ── Frontend build (Vite) ──────────────────────────────────────────────
      # VITE_API_BASE_URL is baked at build time. Empty string = same-origin,
      # which is what we want because Express (in hexa-backend) will serve
      # both the static bundle AND /api/* on the same Azure Web App URL.
      - name: Install and build frontend
        working-directory: ./hexa-assist
        env:
          VITE_API_BASE_URL: ''
        run: |
          npm ci
          npm run build

      # ── Copy the built dist folder into hexa-backend/public ────────────────
      - name: Copy built frontend into backend/public
        run: |
          rm -rf ./hexa-backend/public
          mkdir -p ./hexa-backend/public
          cp -r ./hexa-assist/dist/. ./hexa-backend/public/

      # ── Install backend production dependencies ────────────────────────────
      - name: Install backend production dependencies
        working-directory: ./hexa-backend
        run: npm ci --omit=dev

      # ── Package only the backend folder for Azure App Service ──────────────
      - name: Upload deployment artifact
        uses: actions/upload-artifact@v4
        with:
          name: node-app
          path: ./hexa-backend

  deploy:
    runs-on: ubuntu-latest
    needs: build

    permissions:
      contents: read

    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: node-app
          path: .

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'Hexa-AssistV2'
          slot-name: 'Production'
          publish-profile: ${{ secrets.AZUREAPPSERVICE_PUBLISHPROFILE }}
          package: .
